<!doctype html>
<!-- 404.html — trang báo lỗi không tìm thấy. Tạo bởi Claude (Claude Code · Claude Opus 4.8) -->
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 — Không tìm thấy trang</title>

<link rel="shortcut icon" href="home-design-15144541.png" type="image/x-icon">
<meta property="og:title" content="404 | Bản thiết kế nhà tương tác của Hiếu iceTea 🍀">
<meta property="og:description" content="Ứng dụng thiết kế và mô phỏng bàn vẽ ngôi nhà của Hiếu iceTea 🏡 🍀">
<meta property="og:image" content="https://hieu-icetea.github.io/home-design/banner.jpg">

<style>
  :root{
    --accent:#6366f1; --accent2:#14b8a6;
    --bg1:#eef2ff; --bg2:#e0f7f4;
    --card:#ffffff; --text:#0f172a; --muted:#64748b; --track:#e6e9f2; --border:#e8ecf4;
    --grid:rgba(99,102,241,.10);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg1:#0b1220; --bg2:#0a2128; --card:#161f2e; --text:#e9eef7; --muted:#93a1b5; --track:#2a3650; --border:#26314a; --grid:rgba(129,140,248,.12); }
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;align-items:center;justify-content:center;min-height:100%;padding:24px;
  }
  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:24px;box-shadow:0 24px 60px rgba(2,6,23,.18);
    width:100%;max-width:460px;padding:36px 30px 30px;text-align:center;
    animation:rise .5s cubic-bezier(.21,1,.35,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .logo{
    width:54px;height:54px;border-radius:16px;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;font-size:27px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 8px 20px rgba(99,102,241,.35);
  }
  .code-wrap{
    position:relative;border-radius:20px;padding:18px 10px 22px;margin:0 0 8px;
    background:
      linear-gradient(var(--grid) 1px,transparent 1px) 0 0/26px 26px,
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/26px 26px;
  }
  .code{
    font-size:96px;line-height:1;font-weight:800;letter-spacing:-.04em;margin:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:float 4s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-size:21px;margin:6px 0 6px;font-weight:700;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 26px}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{
    cursor:pointer;font:inherit;font-weight:600;font-size:14.5px;
    padding:12px 20px;border-radius:12px;border:1px solid transparent;text-decoration:none;
    transition:transform .12s ease, box-shadow .2s ease, background .2s ease;display:inline-flex;align-items:center;gap:7px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:0 8px 18px rgba(99,102,241,.32)}
  .btn.primary:hover{box-shadow:0 10px 24px rgba(99,102,241,.45)}
  .btn.ghost{background:transparent;color:var(--text);border-color:var(--border)}
  .btn.ghost:hover{background:var(--track)}
  .foot{margin-top:24px;font-size:12px;color:var(--muted)}
  .foot b{color:var(--accent)}
  @media (prefers-reduced-motion:reduce){
    .card{animation:none} .code{animation:none}
  }
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo" aria-hidden="true">🏡</div>
    <div class="code-wrap"><p class="code">404</p></div>
    <h1>Không tìm thấy trang</h1>
    <p class="sub">Trang bạn tìm không tồn tại hoặc đã được dời đi.<br>Quay lại để xem bản thiết kế ngôi nhà nhé.</p>
    <div class="actions">
      <a class="btn primary" id="homeLink" href="#"><span aria-hidden="true">←</span> Về trang chủ</a>
      <a class="btn ghost" id="designLink" href="#">Xem bản thiết kế <span aria-hidden="true">🏡</span></a>
    </div>
    <p class="foot">Trang của <b>Hiếu iceTea</b> 🍀</p>
  </main>

  <script>
    // ===== Cấu hình liên kết 2 nút — SỬA Ở ĐÂY =====
    var HOME_URL   = 'https://hieu-icetea.io.vn';   // nút "Về trang chủ"
    var DESIGN_URL = './index.html';                // nút "Xem bản thiết kế" (trang đếm ngược)
    // ===============================================
    (function(){
      var isLocal = location.protocol === 'file:' ||
        ['localhost', '127.0.0.1', '[::1]'].indexOf(location.hostname) !== -1;
      // Trên domain thật → bỏ "index.html"/".html" cho URL sạch; file:// & localhost → giữ nguyên.
      var design = isLocal ? DESIGN_URL : DESIGN_URL.replace(/index\.html$/, '').replace(/\.html$/, '');
      var h = document.getElementById('homeLink');   if (h) h.href = HOME_URL;
      var d = document.getElementById('designLink'); if (d) d.href = design;
    })();
  </script>
</body>
</html>
